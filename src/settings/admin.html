<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tg-capi-tracker · settings</title>
<style>
  :root { --bg:#0b0d10; --panel:#14181d; --line:#1f262e; --text:#e6edf3; --muted:#8b949e; --accent:#3fb950; --warn:#d29922; --danger:#f85149; --input:#0d1117; }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 24px; }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 13px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  .group-title { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 12px; }
  .row { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: start; padding: 12px 0; border-top: 1px solid var(--line); }
  .row:first-of-type { border-top: 0; padding-top: 0; }
  .label { font-weight: 500; }
  .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #21262d; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .badge.req { color: var(--danger); }
  .badge.restart { color: var(--warn); }
  .badge.src-runtime { background: #0d2818; color: var(--accent); }
  .badge.src-env { background: #1c2733; color: #58a6ff; }
  .badge.src-default { background: #21262d; color: var(--muted); }
  .badge.src-unset { background: #2d1216; color: var(--danger); }
  .desc { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .input-wrap { display: flex; gap: 8px; }
  input { flex: 1; background: var(--input); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; font: inherit; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  input:focus { outline: 0; border-color: #58a6ff; }
  button { background: #21262d; color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 8px 14px; font: inherit; cursor: pointer; }
  button:hover { background: #2d333b; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.primary:hover { background: #2ea043; }
  button.icon { padding: 8px 10px; }
  .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 16px; border-radius: 6px; max-width: 360px; font-size: 13px; }
  .toast.ok { background: #0d2818; color: var(--accent); border: 1px solid var(--accent); }
  .toast.err { background: #2d1216; color: var(--danger); border: 1px solid var(--danger); }
  .auth-screen { display: flex; flex-direction: column; gap: 12px; }
  .auth-screen p { color: var(--muted); margin: 0; }
  .small { font-size: 12px; color: var(--muted); }
  .empty-hint { color: var(--muted); font-style: italic; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>tg-capi-tracker · runtime settings</h1>
  <div class="sub">Изменения применяются мгновенно, кроме отмеченных <span class="badge restart">restart</span>.</div>

  <div id="auth" class="panel" style="display:none">
    <div class="auth-screen">
      <p>Введи admin-токен (значение <code>ADMIN_TOKEN</code> из <code>.env</code>):</p>
      <div class="input-wrap">
        <input id="token-input" type="password" placeholder="bearer token" autocomplete="off" />
        <button class="primary" id="login-btn">Открыть</button>
      </div>
      <p id="auth-error" class="small" style="color: var(--danger); display: none;"></p>
    </div>
  </div>

  <div id="content" style="display:none"></div>

  <div class="actions" id="actions" style="display:none">
    <button id="logout-btn">Выйти</button>
    <button id="save-btn" class="primary">Сохранить</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
const TOKEN_KEY = 'tg_capi_admin_token';
const $ = (id) => document.getElementById(id);

let currentSettings = [];

function showToast(msg, kind = 'ok', ms = 2800) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + kind;
  t.style.display = 'block';
  setTimeout(() => (t.style.display = 'none'), ms);
}

function token() { return localStorage.getItem(TOKEN_KEY); }
function setToken(v) { localStorage.setItem(TOKEN_KEY, v); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

async function api(path, opts = {}) {
  const res = await fetch('/admin' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + (token() || ''),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { clearToken(); render(); throw new Error('Unauthorized'); }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || ('HTTP ' + res.status));
  }
  return res.json();
}

function groupTitle(g) {
  return ({ telegram: 'Telegram', facebook: 'Facebook CAPI', pool: 'Invite-link pool' })[g] || g;
}

function renderSettings(settings) {
  currentSettings = settings;
  const groups = settings.reduce((acc, s) => ((acc[s.group] ||= []).push(s), acc), {});
  const content = $('content');
  content.innerHTML = '';

  for (const g of ['telegram', 'facebook', 'pool']) {
    if (!groups[g]) continue;
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="group-title">' + groupTitle(g) + '</div>';
    for (const s of groups[g]) {
      const row = document.createElement('div');
      row.className = 'row';

      const left = document.createElement('div');
      left.innerHTML = '<div class="label">' + s.key + '</div>';
      const meta = document.createElement('div');
      meta.className = 'meta';
      if (s.required) meta.innerHTML += '<span class="badge req">required</span>';
      if (s.restartRequired) meta.innerHTML += '<span class="badge restart">restart</span>';
      if (s.secret) meta.innerHTML += '<span class="badge">secret</span>';
      meta.innerHTML += '<span class="badge src-' + s.source + '">' + s.source + '</span>';
      left.appendChild(meta);
      if (s.description) {
        const d = document.createElement('div');
        d.className = 'desc';
        d.textContent = s.description;
        left.appendChild(d);
      }

      const right = document.createElement('div');
      const wrap = document.createElement('div');
      wrap.className = 'input-wrap';
      const input = document.createElement('input');
      input.dataset.key = s.key;
      input.dataset.type = s.type;
      input.type = s.secret ? 'password' : (s.type === 'number' ? 'number' : 'text');
      input.value = s.value;
      input.placeholder = s.default != null ? 'default: ' + s.default : (s.source === 'unset' ? 'not set' : '');
      wrap.appendChild(input);
      if (s.secret) {
        const eye = document.createElement('button');
        eye.type = 'button';
        eye.className = 'icon';
        eye.textContent = '👁';
        eye.title = 'Показать/скрыть';
        eye.onclick = () => { input.type = input.type === 'password' ? 'text' : 'password'; };
        wrap.appendChild(eye);
      }
      right.appendChild(wrap);
      if (s.source === 'env' || s.source === 'default') {
        const h = document.createElement('div');
        h.className = 'empty-hint';
        h.textContent = 'Очисти поле, чтобы сбросить к ' + s.source + '-значению.';
        right.appendChild(h);
      }

      row.appendChild(left);
      row.appendChild(right);
      panel.appendChild(row);
    }
    content.appendChild(panel);
  }
}

async function load() {
  try {
    const { settings } = await api('/settings');
    renderSettings(settings);
    $('auth').style.display = 'none';
    $('content').style.display = '';
    $('actions').style.display = '';
  } catch (e) {
    if (e.message !== 'Unauthorized') showToast('Ошибка: ' + e.message, 'err');
  }
}

async function save() {
  const body = {};
  document.querySelectorAll('input[data-key]').forEach((el) => {
    const key = el.dataset.key;
    const original = currentSettings.find((s) => s.key === key);
    const v = el.value;
    if (v === '' && original.source !== 'runtime') return;
    if (v === original.value && original.source === 'runtime') return;
    body[key] = v;
  });
  if (!Object.keys(body).length) { showToast('Нет изменений', 'ok'); return; }
  try {
    await api('/settings', { method: 'POST', body: JSON.stringify(body) });
    showToast('Сохранено', 'ok');
    await load();
  } catch (e) {
    showToast('Ошибка: ' + e.message, 'err');
  }
}

function render() {
  if (token()) load();
  else {
    $('auth').style.display = '';
    $('content').style.display = 'none';
    $('actions').style.display = 'none';
    setTimeout(() => $('token-input').focus(), 0);
  }
}

$('login-btn').onclick = () => {
  const v = $('token-input').value.trim();
  if (!v) return;
  setToken(v);
  $('token-input').value = '';
  render();
};
$('token-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('login-btn').click(); });
$('logout-btn').onclick = () => { clearToken(); render(); };
$('save-btn').onclick = save;

render();
</script>
</body>
</html>
